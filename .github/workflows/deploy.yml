# Build on every push/PR; deploy to GitHub Pages on push to main.
#
# One-time setup for the deploy to work:
#   GitHub repo → Settings → Pages → Build and deployment → Source: "GitHub Actions"
#
# Custom domain note: without a custom domain the site is served at
# https://roialfassi.github.io/Shefa-Tal/ (a subpath), and Astro would need
# `base: '/Shefa-Tal'` in astro.config.mjs for links to work. Once the real
# domain (e.g. shefatal.co.il) is attached in the Pages settings, no `base`
# is needed — just update `site` in astro.config.mjs to match.
#
# If you deploy via Cloudflare Pages instead (connect the repo in its
# dashboard), delete the `deploy` job below — the `build` job still
# validates every push.

name: Build & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Upload Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
